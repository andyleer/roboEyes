<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Robot Eyes</title>
  <style>
    :root {
      --bg: #0a0d12;
      --panel: #111723;
      --glow: #8ff7ff;
      --dim: #1b2a35;
      --accent: #d7fbff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 35%, #1a2231 0%, #0d121a 35%, #05070b 100%);
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    .frame {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #121826 0%, #0a0f17 100%);
      position: relative;
      overflow: hidden;
    }

    .screen-wrap {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      box-shadow: inset 0 0 48px rgba(143,247,255,0.08);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #070a0f;
      filter: saturate(1.03) contrast(1.05);
    }

    .screen-wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,0.05) 0px,
          rgba(255,255,255,0.05) 1px,
          rgba(0,0,0,0.18) 2px,
          rgba(0,0,0,0.18) 4px
        );
      mix-blend-mode: soft-light;
      opacity: 0.7;
      pointer-events: none;
    }

    .screen-wrap::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 45%, transparent 45%, rgba(0,0,0,0.18) 100%),
        linear-gradient(120deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 18%, transparent 32%);
      pointer-events: none;
    }

    .scanline {
      position: absolute;
      left: 0;
      right: 0;
      height: 10%;
      background: linear-gradient(to bottom, rgba(143,247,255,0), rgba(143,247,255,0.14), rgba(143,247,255,0));
      mix-blend-mode: screen;
      pointer-events: none;
      animation: scan 6s linear infinite;
    }

    @keyframes scan {
      0% { transform: translateY(-120%); }
      100% { transform: translateY(1100%); }
    }

    .label {
      position: absolute;
      bottom: 14px;
      left: 16px;
      font-size: 11px;
      letter-spacing: 0.18em;
      color: rgba(215, 251, 255, 0.5);
      text-transform: uppercase;
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="screen-wrap">
      <canvas id="screen" width="128" height="72"></canvas>
      <div class="scanline"></div>
    </div>
    <div class="label">robot eyes // online</div>
  </div>

  <script>
    const canvas = document.getElementById('screen');
    const ctx = canvas.getContext('2d');

    const W = canvas.width;
    const H = canvas.height;

    const state = {
      lookX: 0,
      lookY: 0,
      targetX: 0,
      targetY: 0,
      blink: 0,
      blinkCooldown: 90,
      mood: 'neutral',
      moodTimer: 0,
      t: 0,
      glitch: 0
    };

    const moods = ['neutral', 'curious', 'happy', 'sleepy'];

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function chance(n) {
      return Math.random() < n;
    }

    function choose(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function fillRect(x, y, w, h, color) {
      ctx.fillStyle = color;
      ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
    }

    function drawPixelGrid() {
      ctx.strokeStyle = 'rgba(143,247,255,0.05)';
      ctx.lineWidth = 1;

      for (let x = 0; x <= W; x += 4) {
        ctx.beginPath();
        ctx.moveTo(x + 0.5, 0);
        ctx.lineTo(x + 0.5, H);
        ctx.stroke();
      }

      for (let y = 0; y <= H; y += 4) {
        ctx.beginPath();
        ctx.moveTo(0, y + 0.5);
        ctx.lineTo(W, y + 0.5);
        ctx.stroke();
      }
    }

    function drawGlowBlock(x, y, w, h) {
      fillRect(x, y, w, h, '#1b2a35');
      fillRect(x + 1, y + 1, w - 2, h - 2, '#8ff7ff');
      if (w > 4 && h > 4) {
        fillRect(x + 2, y + 2, w - 4, h - 4, '#d7fbff');
      }
    }

    function drawEye(cx, cy, openness, browTilt) {
      const eyeW = 40;
      const eyeH = Math.max(5, Math.round(26 * openness));
      const eyeX = cx - eyeW / 2;
      const eyeY = cy - eyeH / 2;

      drawGlowBlock(eyeX, eyeY, eyeW, eyeH);

      const highlightW = 10;
      const highlightH = Math.max(2, Math.round(5 * openness));
      fillRect(eyeX + 6, eyeY + 4, highlightW, highlightH, 'rgba(255,255,255,0.28)');

      const browY = eyeY - 5;
      fillRect(eyeX + 4, browY + browTilt, eyeW - 8, 2, '#8ff7ff');
    }

    function getMoodShape() {
      switch (state.mood) {
        case 'happy':
          return { openness: 0.95, leftBrow: 1, rightBrow: 1 };
        case 'curious':
          return { openness: 1.0, leftBrow: -1, rightBrow: 1 };
        case 'sleepy':
          return { openness: 0.5, leftBrow: 1, rightBrow: 1 };
        default:
          return { openness: 0.82, leftBrow: 0, rightBrow: 0 };
      }
    }

    function update() {
      state.t += 1;

      if (chance(0.02)) {
        state.targetX = (Math.random() * 2 - 1);
        state.targetY = (Math.random() * 2 - 1) * 0.7;
      }

      if (chance(0.004)) {
        state.mood = choose(moods);
        state.moodTimer = 120 + Math.random() * 180;
      }

      if (chance(0.01)) {
        state.glitch = 1 + Math.random() * 2;
      }

      if (state.glitch > 0) {
        state.glitch -= 0.08;
      }

      if (state.moodTimer > 0) {
        state.moodTimer -= 1;
      } else {
        state.mood = 'neutral';
      }

      state.lookX = lerp(state.lookX, state.targetX, 0.05);
      state.lookY = lerp(state.lookY, state.targetY, 0.05);

      if (state.blink > 0) {
        state.blink -= 0.2;
      } else {
        state.blinkCooldown -= 1;
        if (state.blinkCooldown <= 0) {
          state.blink = 1;
          state.blinkCooldown = 80 + Math.random() * 180;
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      fillRect(0, 0, W, H, '#070a0f');

      const shimmer = Math.sin(state.t * 0.03) * 0.5 + 0.5;
      fillRect(0, H - 8, W, 8, `rgba(143,247,255,${0.05 + shimmer * 0.03})`);

      drawPixelGrid();

      const idleBob = Math.sin(state.t * 0.04) * 1.2;
      const shape = getMoodShape();
      const blinkFactor = state.blink > 0 ? Math.abs(state.blink - 0.5) * 2 : 1;
      const openness = clamp(shape.openness * blinkFactor, 0.08, 1);

      if (state.glitch > 0) {
        ctx.save();
        ctx.translate((Math.random() - 0.5) * 2, 0);
      }

      drawEye(38, 36 + idleBob, openness, shape.leftBrow);
      drawEye(90, 36 + idleBob, openness, shape.rightBrow);

      if (state.glitch > 0) {
        ctx.restore();
        fillRect(0, 12 + Math.random() * 40, W, 1, 'rgba(143,247,255,0.25)');
      }

      if (chance(0.02)) {
        fillRect(Math.random() * W, Math.random() * H, 1, 1, 'rgba(215,251,255,0.2)');
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    loop();

    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width;
      const y = (e.clientY - rect.top) / rect.height;
      state.targetX = (x - 0.5) * 2;
      state.targetY = (y - 0.5) * 1.6;
      state.mood = 'curious';
      state.moodTimer = 45;
    });

    canvas.addEventListener('mouseleave', () => {
      state.targetX = 0;
      state.targetY = 0;
      state.mood = 'neutral';
      state.moodTimer = 30;
    });

    canvas.addEventListener('click', () => {
      state.mood = choose(['happy', 'curious', 'neutral']);
      state.moodTimer = 120;
      state.blink = 1;
    });
  </script>
</body>
</html>
